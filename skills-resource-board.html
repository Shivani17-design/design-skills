<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Resource Board</title>
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --accent: #7c6af7;
      --accent-soft: #7c6af720;
      --text: #e8e8f0;
      --muted: #888899;
      --hover: #22222a;
      --badge: #7c6af730;
      --green: #3ecf8e;
      --green-soft: #3ecf8e18;
      --orange: #f59e0b;
      --orange-soft: #f59e0b18;
      --blue: #38bdf8;
      --blue-soft: #38bdf818;
      --pink: #f472b6;
      --pink-soft: #f472b618;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      padding: 48px 40px 32px;
      max-width: 1300px;
      margin: 0 auto;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 360px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 12px 9px 38px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    .filter-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 5px 14px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .tab:hover { border-color: var(--accent); color: var(--text); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 40px 60px;
    }

    .stats {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 24px;
    }

    .stats span { color: var(--accent); font-weight: 600; }

    .section { margin-bottom: 44px; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .section-header h2 {
      font-size: 15px;
      font-weight: 600;
    }

    .section-count {
      background: var(--badge);
      color: var(--accent);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
    }

    .install-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .source-badge {
      font-size: 11px;
      font-weight: 500;
      border-radius: 5px;
      padding: 3px 9px;
      border: 1px solid;
      white-space: nowrap;
    }

    .source-badge.builtin  { color: var(--green);  background: var(--green-soft);  border-color: var(--green)40; }
    .source-badge.plugin   { color: var(--blue);   background: var(--blue-soft);   border-color: var(--blue)40; }
    .source-badge.github   { color: var(--orange); background: var(--orange-soft); border-color: var(--orange)40; }
    .source-badge.local    { color: var(--pink);   background: var(--pink-soft);   border-color: var(--pink)40; }

    .install-cmd {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px 4px 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .install-cmd:hover { border-color: var(--accent); }

    .install-cmd code {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: var(--accent);
    }

    .install-cmd svg { color: var(--muted); flex-shrink: 0; }

    .gh-link {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .gh-link:hover { color: var(--text); border-color: var(--orange); }
    .gh-link svg { flex-shrink: 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      transition: border-color 0.15s, background 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--hover);
    }

    .card-name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .card-cmd {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 4px;
      padding: 2px 6px;
      display: inline-block;
      margin-bottom: 8px;
      cursor: pointer;
      user-select: all;
      transition: all 0.15s;
    }

    .card-cmd:hover { background: var(--accent); color: #fff; }

    .card-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .card-gh {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .card-gh a {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--orange);
      font-size: 11px;
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.15s;
    }

    .card-gh a:hover { opacity: 1; }

    .hidden { display: none !important; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state svg { margin-bottom: 16px; opacity: 0.4; }
    .empty-state p { font-size: 15px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #fff;
      color: #111;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 8px;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px #0008;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 640px) {
      header, main { padding-left: 20px; padding-right: 20px; }
      header { padding-top: 32px; }
      .grid { grid-template-columns: 1fr; }
      .install-row { margin-left: 0; }
    }
  </style>
</head>

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 1800);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast("Copied!"));
}

function totalSkills() {
  return data.reduce((n, d) => n + d.skills.length, 0);
}

const tabs = ["All", ...data.map(d => d.category)];
let activeTab = "All";
let searchQuery = "";

function buildSourceRow(source) {
  if (!source) return "";

  const labelMap = { builtin: "Built-in", plugin: "Official plugin", github: "GitHub", local: "Local" };
  const badge = `<span class="source-badge ${source.type}">${labelMap[source.type] || source.type}</span>`;

  let installBtn = "";
  if (source.installCmd) {
    installBtn = `<div class="install-cmd" data-copy="${source.installCmd}" title="Click to copy install command">
      ${COPY_ICON}<code>${source.installCmd}</code>
    </div>`;
  }

  let ghLink = "";
  if (source.url) {
    ghLink = `<a href="${source.url}" target="_blank" class="gh-link">${GH_ICON} ${source.label}</a>`;
  } else if (source.label && source.type === "builtin") {
    // no link for built-in
  }

  return `<div class="install-row">${badge}${installBtn}${ghLink}</div>`;
}

function render() {
  const board = document.getElementById("board");
  const empty = document.getElementById("empty");
  const stats = document.getElementById("stats");
  board.innerHTML = "";

  const q = searchQuery.toLowerCase();
  let shown = 0;

  data.forEach(section => {
    if (activeTab !== "All" && activeTab !== section.category) return;

    const filtered = section.skills.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.cmd.toLowerCase().includes(q) ||
      s.desc.toLowerCase().includes(q)
    );

    if (!filtered.length) return;
    shown += filtered.length;

    const sec = document.createElement("div");
    sec.className = "section";

    sec.innerHTML = `
      <div class="section-header">
        <h2>${section.category}</h2>
        <span class="section-count">${filtered.length}</span>
        ${buildSourceRow(section.source)}
      </div>
      <div class="grid"></div>
    `;

    // wire copy on install-cmd buttons inside this section
    sec.querySelectorAll(".install-cmd").forEach(btn => {
      btn.addEventListener("click", () => copyText(btn.dataset.copy));
    });

    const grid = sec.querySelector(".grid");
    filtered.forEach(skill => {
      const card = document.createElement("div");
      card.className = "card";

      const ghSection = skill.gh
        ? `<div class="card-gh"><a href="${skill.gh}" target="_blank">${GH_ICON} View on GitHub</a></div>`
        : "";

      const installSection = skill.installCmd
        ? `<div class="card-gh"><span class="card-cmd" data-copy="${skill.installCmd}" title="Copy install command" style="color:var(--green);background:var(--green-soft)">${skill.installCmd}</span></div>`
        : "";

      card.innerHTML = `
        <div class="card-name">${skill.name}</div>
        <div class="card-cmd" title="Click to copy">${skill.cmd}</div>
        <div class="card-desc">${skill.desc}</div>
        ${installSection}
        ${ghSection}
      `;

      card.querySelectorAll(".card-cmd").forEach(el => {
        el.addEventListener("click", () => copyText(el.textContent.trim()));
      });

      grid.appendChild(card);
    });

    board.appendChild(sec);
  });

  const total = totalSkills();
  stats.innerHTML = shown === total
    ? `<span>${total}</span> skills across ${data.length} categories`
    : `Showing <span>${shown}</span> of ${total} skills`;

  empty.classList.toggle("hidden", shown > 0);
  board.classList.toggle("hidden", shown === 0);
}

function buildTabs() {
  const container = document.getElementById("tabs");
  tabs.forEach(label => {
    const btn = document.createElement("button");
    btn.className = "tab" + (label === "All" ? " active" : "");
    btn.textContent = label;
    btn.addEventListener("click", () => {
      activeTab = label;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
    container.appendChild(btn);
  });
}

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  render();
});

buildTabs();
render();
</script>
